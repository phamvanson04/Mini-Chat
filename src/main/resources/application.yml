spring:
     datasource:
          url: jdbc:mysql://localhost:3306/mini_chat_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          username: root
          password: root
          driver-class-name: com.mysql.cj.jdbc.Driver
     jpa:
          hibernate:
               ddl-auto: update
          show-sql: false
          properties:
               hibernate:
                    format_sql: true
     data:
          mongodb:
               uri: mongodb://localhost:27017/mini_chat
          redis:
               host: localhost
               port: 6379

app:
     jwt:
          secret: 12345678901234567890123456789012
          expiration-ms: 86400000
     presence:
          ttl-seconds: 30
