services:
     app:
          build:
               context: .
               dockerfile: Dockerfile
          image: mini-chat:latest
          container_name: mini-chat-app
          ports:
               - "8080:8080"
          environment:
               SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mini_chat_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
               SPRING_DATASOURCE_USERNAME: root
               SPRING_DATASOURCE_PASSWORD: root
               SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mini_chat
               SPRING_DATA_REDIS_HOST: redis
               SPRING_DATA_REDIS_PORT: 6379
               APP_JWT_SECRET: 12345678901234567890123456789012
               APP_JWT_EXPIRATION_MS: 86400000
          depends_on:
               mysql:
                    condition: service_healthy
               mongodb:
                    condition: service_healthy
               redis:
                    condition: service_healthy
          restart: unless-stopped

     mysql:
          image: mysql:8.4
          container_name: mini-chat-mysql
          environment:
               MYSQL_ROOT_PASSWORD: root
               MYSQL_DATABASE: mini_chat_auth
          ports:
               - "3307:3306"
          volumes:
               - mysql_data:/var/lib/mysql
          healthcheck:
               test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
               interval: 10s
               timeout: 5s
               retries: 10

     mongodb:
          image: mongo:7
          container_name: mini-chat-mongo
          ports:
               - "27017:27017"
          volumes:
               - mongo_data:/data/db
          healthcheck:
               test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
               interval: 10s
               timeout: 5s
               retries: 10

     redis:
          image: redis:7-alpine
          container_name: mini-chat-redis
          ports:
               - "6379:6379"
          volumes:
               - redis_data:/data
          healthcheck:
               test: ["CMD", "redis-cli", "ping"]
               interval: 10s
               timeout: 5s
               retries: 10

volumes:
     mysql_data:
     mongo_data:
     redis_data:
